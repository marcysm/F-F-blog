<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Acesso — Feras e Flores</title>
  <link rel="stylesheet" href="admin.css">
</head>

<body class="login-page" data-page="login">
  <main class="login-layout">
    <section class="login-poster">
      <a class="admin-brand" href="index.html">
        <span class="admin-brand-mark">
          <span></span>
        </span>

        <div>
          <strong>FERAS &amp; FLORES</strong>
          <small>ARQUIVO ADMINISTRATIVO</small>
        </div>
      </a>

      <div class="login-poster-copy">
        <p class="admin-kicker">ÁREA RESTRITA</p>

        <h1>
          O ARQUIVO NÃO
          <span>DEVERIA ESTAR ABERTO.</span>
        </h1>

        <p>
          Somente contas autorizadas podem criar registros,
          configurar pesquisas e preparar eventos.
        </p>
      </div>

      <div class="poster-warning">
        <span>!</span>
        <p>NÃO COMPARTILHE SUAS CREDENCIAIS.</p>
      </div>
    </section>

    <section class="login-form-side">
      <div class="login-card">
        <a class="back-link" href="index.html">← VOLTAR AO ARQUIVO</a>

        <p class="admin-kicker">AUTENTICAÇÃO</p>
        <h2>ENTRAR</h2>

        <form
          id="login-form"
          class="login-form"
          method="post"
          action="javascript:void(0)"
          novalidate
        >
          <label for="login-email">EMAIL</label>
          <input
            id="login-email"
            type="email"
            autocomplete="email"
            placeholder="conta@exemplo.com"
            required
          >

          <label for="login-password">SENHA</label>

          <div class="password-control">
            <input
              id="login-password"
              type="password"
              autocomplete="current-password"
              placeholder="Digite sua senha"
              required
            >

            <button
              id="toggle-password"
              type="button"
              aria-label="Mostrar senha"
            >
              MOSTRAR
            </button>
          </div>

          <div
            id="login-message"
            class="login-message"
            role="alert"
            aria-live="polite"
            hidden
          ></div>

          <button id="login-button" class="login-submit" type="submit">
            <span class="button-text">AUTENTICAR</span>
            <span class="button-loader" hidden></span>
          </button>
        </form>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>

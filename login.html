<!DOCTYPE html>
<html lang="pt-BR">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width,initial-scale=1" name="viewport"/>
  <meta content="noindex" name="robots"/>
  <title>
   Acesso &mdash; Feras e Flores
  </title>
  <link href="admin.css" rel="stylesheet"/>
 </head>
 <body class="login-page" data-page="login">
  <main class="login-layout">
   <section class="poster">
    <a href="index.html">
     <b>
      FERAS &amp; FLORES
     </b>
     <small>
      ARQUIVO ADMINISTRATIVO
     </small>
    </a>
    <div>
     <p class="tag">
      &Aacute;REA RESTRITA
     </p>
     <h1>
      O ARQUIVO N&Atilde;O
      <span>
       DEVERIA ESTAR ABERTO.
      </span>
     </h1>
    </div>
   </section>
   <section class="login-side">
    <div class="login-card">
     <a href="index.html">
      &larr; VOLTAR
     </a>
     <p class="tag">
      AUTENTICA&Ccedil;&Atilde;O
     </p>
     <h2>
      ENTRAR
     </h2>
     <form action="javascript:void(0)" id="loginForm" method="post" novalidate="">
      <label>
       EMAIL
      </label>
      <input autocomplete="email" id="email" placeholder="conta@exemplo.com" required="" type="email"/>
      <label>
       SENHA
      </label>
      <input autocomplete="current-password" id="password" placeholder="Digite sua senha" required="" type="password"/>
      <div class="message" hidden="" id="loginMessage">
      </div>
      <button id="loginButton" type="submit">
       AUTENTICAR
      </button>
     </form>
    </div>
   </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <script src="config.js">
  </script>
  <script src="admin.js">
  </script>
 </body>
</html>

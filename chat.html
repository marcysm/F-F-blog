<!DOCTYPE html>
<html lang="pt-BR">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width,initial-scale=1" name="viewport"/>
  <title>
   Canal &mdash; Feras e Flores
  </title>
  <link href="chat.css" rel="stylesheet"/>
 </head>
 <body>
  <main class="chat" id="chatShell">
   <header>
    <div>
     <small>
      CANAL N&Atilde;O IDENTIFICADO
     </small>
     <h1 id="speaker">
      Algo
     </h1>
    </div>
    <button id="resetChat" title="Apagar mem&oacute;ria local" type="button">
     REINICIAR
    </button>
   </header>
   <section class="messages" id="messages">
   </section>
   <div class="typing" hidden="" id="typing">
    Algo est&aacute; digitando...
   </div>
   <form id="chatForm" novalidate="">
    <input aria-label="Mensagem para Algo" autocomplete="off" id="chatInput" maxlength="500" placeholder="Escreva uma mensagem..."/>
    <button type="submit">
     ENVIAR
    </button>
   </form>
  </main>
  <div class="fx-black" id="fxBlack">
  </div>
  <div class="fx-half" id="fxHalf">
  </div>
  <div class="fx-text" hidden="" id="fxText">
  </div>
  <div class="fx-media" hidden="" id="fxMedia">
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <script src="config.js">
  </script>
  <script src="effects.js">
  </script>
  <script src="chat.js">
  </script>
 </body>
</html>

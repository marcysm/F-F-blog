<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Canal — Feras e Flores</title>
    <link rel="stylesheet" href="chat.css" />
  </head>
  <body>
    <main id="chatShell" class="chat">
      <header>
        <div>
          <small>CANAL NÃO IDENTIFICADO</small>
          <h1 id="speaker">Algo</h1>
        </div>
        <button id="resetChat" title="Apagar memória local">REINICIAR</button>
      </header>
      <section id="messages" class="messages"></section>
      <div id="typing" class="typing" hidden>Algo está digitando...</div>
      <form id="chatForm">
        <input
          id="chatInput"
          autocomplete="off"
          placeholder="Escreva uma mensagem..."
        /><button>ENVIAR</button>
      </form>
    </main>
    <div id="fxBlack" class="fx-black"></div>
    <div id="fxHalf" class="fx-half"></div>
    <div id="fxText" class="fx-text" hidden></div>
    <div id="fxMedia" class="fx-media" hidden></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="effects.js"></script>
    <script src="chat.js"></script>
  </body>
</html>

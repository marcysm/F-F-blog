<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta name="robots" content="noindex, nofollow">

  <title>Canal — Feras e Flores</title>

  <link rel="stylesheet" href="chat.css">
</head>

<body>
  <main id="chat-shell" class="chat">
    <header class="chat-header">
      <div>
        <small id="chat-channel-label">
          CANAL NÃO IDENTIFICADO
        </small>

        <h1 id="chat-speaker">
          Algo
        </h1>
      </div>

      <a
        class="chat-exit"
        href="index.html"
        aria-label="Voltar ao arquivo"
      >
        SAIR
      </a>
    </header>

    <section
      id="chat-messages"
      class="messages"
      aria-live="polite"
      aria-label="Histórico da conversa"
    ></section>

    <div
      id="chat-typing"
      class="typing"
      role="status"
      aria-live="polite"
      hidden
    >
      Algo está digitando...
    </div>

    <form
      id="chat-form"
      class="chat-form"
      action="javascript:void(0)"
      method="post"
      novalidate
    >
      <label class="sr-only" for="chat-input">
        Escreva uma mensagem
      </label>

      <input
        id="chat-input"
        type="text"
        autocomplete="off"
        spellcheck="true"
        maxlength="500"
        placeholder="Escreva uma mensagem..."
        required
      >

      <button
        id="chat-send-button"
        type="submit"
      >
        ENVIAR
      </button>
    </form>
  </main>

  <section
    id="chat-error"
    class="chat-error"
    role="alert"
    hidden
  >
    <h1>CANAL INDISPONÍVEL</h1>
    <p id="chat-error-message">
      Não foi possível abrir esta conversa.
    </p>

    <a href="index.html">
      VOLTAR AO ARQUIVO
    </a>
  </section>

  <div
    id="fxBlack"
    class="fx-black"
    aria-hidden="true"
  ></div>

  <div
    id="fxHalf"
    class="fx-half"
    aria-hidden="true"
  ></div>

  <div
    id="fxText"
    class="fx-text"
    hidden
  ></div>

  <div
    id="fxMedia"
    class="fx-media"
    hidden
  ></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="effects.js"></script>
  <script src="chat.js"></script>
</body>
</html>
